<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة البيانات الاقتصادية العالمية | مشروع GIS متقدم</title>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <aside id="sidebar">
        <header>
            <h2>📊 Global Economy Dashboard</h2>
            <p> Global API-Driven Web GIS Dashboard</p>
        </header>

        <section class="control-group">
            <label for="year-slider"> Choose The Year: <span id="year-value">2024</span></label>
            <input type="range" id="year-slider" min="2010" max="2024" value="2024"> 
        </section>
    <section class="control-group" style="margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px;">
    <p style="font-weight: bold; margin-bottom: 5px;">Change Map Style:</p>
    <button id="btn-osm" style="cursor: pointer; padding: 5px 10px; margin-left: 5px;">Open Street Map</button>
    <button id="btn-satellite" style="cursor: pointer; padding: 5px 10px;">Satellite</button>
</section>

        <section class="stats-box">
            <h3> Quick Details</h3>
            <div id="country-info">
                <p>قم بتمرير الفأرة فوق الدولة لعرض البيانات...</p>
            </div>
        </section>
        <section class="control-group" style="margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px;">
    <label for="gdp-filter"><strong>فلترة حسب الاقتصاد:</strong></label>
    <select id="gdp-filter" style="width: 100%; margin-top: 5px;">
        <option value="0">كل الدول</option>
        <option value="500000000000">أكثر من 500 مليار</option>
        <option value="1000000000000">أكثر من 1 تريليون</option>
    </select>
</section>
        <div style="width: 100%; max-width: 400px; margin-top: 20px;">
    <canvas id="gdpChart"></canvas>
</div>
         <div id="stats-box" class="stats-box">
    </div>
    <div id="legend">
    <div style="text-align: center; margin-bottom: 5px; font-weight: bold;"> Gross Domestic Product (GDP)</div>
    <div class="legend-gradient"></div>
    <div class="legend-labels">
        <span>مرتفع</span>
        <span>منخفض</span>
    </div>
</div>
        <footer>
            <small>تم التطوير باستخدام MapLibre & World Bank API</small>
        </footer>
    </aside>

    <main id="map"></main>

    
    </div>
   
<div id="loading-spinner" style="display:none;">جاري تحميل البيانات...</div>

    <script src="script.js"></script>
</body>
</html>
